<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;
    background:radial-gradient(1200px 700px at 70% -10%,#0f5c49 0%,transparent 55%),#0a1310;
    color:#eaf0ec;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .card{width:100%;max-width:400px;background:#101e19;border:1px solid #23392f;border-radius:20px;
    padding:34px 30px 26px;box-shadow:0 30px 70px rgba(0,0,0,.5);text-align:center}
  .glyph{width:46px;height:46px;border-radius:13px;margin:0 auto 16px;position:relative;
    background:linear-gradient(145deg,#0e5c49,#0a3f33)}
  .glyph::after{content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 68% 30%,#e0a748 0 4px,transparent 4.4px)}
  .brand{font-weight:800;font-size:19px;letter-spacing:-.01em}
  .brand b{color:#54c3a2}
  h1{font-size:1.18rem;margin:18px 0 6px;letter-spacing:-.02em;font-weight:800;line-height:1.2}
  .sub{color:#9db0a8;font-size:14px;margin:0 0 22px;line-height:1.5}
  form{display:flex;flex-direction:column;gap:10px}
  input{width:100%;padding:13px 15px;border-radius:11px;border:1px solid #2c463c;background:#0b1512;
    color:#eaf0ec;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
  input:focus{border-color:#54c3a2}
  button{width:100%;padding:13px 15px;border:0;border-radius:11px;background:#e0a748;color:#08130f;
    font-weight:800;font-size:15px;font-family:inherit;cursor:pointer;transition:filter .15s}
  button:hover{filter:brightness(1.06)}
  button:disabled{opacity:.6;cursor:default}
  .err{color:#e07356;font-size:13px;margin-top:12px;font-weight:600}
  .foot{margin-top:20px;font-size:11px;color:#71857c;letter-spacing:.02em;
    font-family:ui-monospace,"Cascadia Code",Consolas,monospace}
  [hidden]{display:none!important}
</style>

<div class="card">
  <div class="glyph" aria-hidden="true"></div>
  <div class="brand">Grow<b>Up</b> One</div>
  <h1>Tài liệu chiến lược &amp; sản phẩm</h1>
  <p class="sub">Nội dung được mã hoá. Nhập mật khẩu để mở.</p>
  <form id="f">
    <input id="pw" type="password" placeholder="Mật khẩu" autocomplete="off" autofocus aria-label="Mật khẩu">
    <button id="btn" type="submit">Mở khoá</button>
  </form>
  <div id="err" class="err" hidden>Sai mật khẩu — thử lại.</div>
  <div id="warn" class="err" hidden>Cần mở bằng đường link https (không mở file trực tiếp) để giải mã.</div>
  <div class="foot">🔒 Mã hoá AES-256 · chỉ người có mật khẩu đọc được</div>
</div>

  function b64ToBytes(s){ var bin=atob(s), u=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }

  async function unlock(password){
    var enc=new TextEncoder();
    var km=await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
    var key=await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:b64ToBytes(SALT), iterations:ITER, hash:"SHA-256"},
      km, {name:"AES-CBC", length:256}, false, ["decrypt"]);
    var ptBuf=await crypto.subtle.decrypt({name:"AES-CBC", iv:b64ToBytes(IV)}, key, b64ToBytes(CT));
    return new TextDecoder().decode(ptBuf);
  }

  f.addEventListener("submit", async function(e){
    e.preventDefault();
    err.hidden=true; btn.disabled=true; btn.textContent="Đang mở…";
    try{
      var html=await unlock(pw.value);
      document.open(); document.write(html); document.close();
    }catch(ex){
      err.hidden=false; btn.disabled=false; btn.textContent="Mở khoá";
      pw.value=""; pw.focus();
    }
  });
})();
</script>

</body>
</html>
